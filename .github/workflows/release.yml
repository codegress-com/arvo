name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0 — without the v prefix)"
        required: true
        type: string

permissions:
  contents: write

env:
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Preflight ─────────────────────────────────────────────────────────────
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --features full,serde -- -Dclippy::all
      - run: cargo test --features full,serde

  # ── Bump version, commit, tag ─────────────────────────────────────────────
  bump:
    name: bump version
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers downstream workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in Cargo.toml
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          # Verify the change
          grep "^version" Cargo.toml

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        id: tag
        run: |
          TAG="v${{ inputs.version }}"
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "Version already set to ${{ inputs.version }}, skipping commit."
          else
            git commit -m "chore: release $TAG"
            git push origin main
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: bump
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────
  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [bump, publish]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
          fetch-depth: 0
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          make_latest: true
