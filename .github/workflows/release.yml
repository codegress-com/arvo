name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Preflight: full CI must pass on this exact commit ─────────────────────
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-features -- -Dclippy::all
      - name: test
        run: cargo test --features full,serde

  # ── Verify tag matches Cargo.toml version ─────────────────────────────────
  verify-version:
    name: verify-version
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "arvo") | .version')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag version:        $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi

  # ── Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [preflight, verify-version]
    environment: crates-io  # Requires a GitHub environment with CARGO_REGISTRY_TOKEN secret
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        run: cargo publish # --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Create GitHub Release with auto-generated notes ───────────────────────
  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for release notes generation
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
