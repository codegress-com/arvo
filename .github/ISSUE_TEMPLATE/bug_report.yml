name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest possible code that demonstrates the issue.
      render: rust
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: arvo-version
    attributes:
      label: arvo version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: "`rustc --version`"
      placeholder: "rustc 1.85.0"
    validations:
      required: true

  - type: input
    id: features
    attributes:
      label: Enabled features
      placeholder: "contact, serde"

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
