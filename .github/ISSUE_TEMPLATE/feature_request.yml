name: Feature request
description: Suggest a new value object type or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please check the [roadmap in README.md](../../README.md#roadmap) and existing issues.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What domain problem would this solve? What are you trying to represent?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What type(s) would you add? What would the API look like?
      render: rust

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered or existing crates that partially solve this.

  - type: dropdown
    id: willing-to-implement
    attributes:
      label: Are you willing to submit a PR?
      options:
        - "Yes"
        - "No"
        - "Maybe, with guidance"
